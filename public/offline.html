<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GreenPrinting Offline</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0f172a;color:#e2e8f0;font-family:Arial,sans-serif}
    .card{max-width:460px;margin:24px;padding:32px;border:1px solid rgba(255,255,255,.12);border-radius:24px;background:linear-gradient(145deg,#111827,#064e3b);box-shadow:0 24px 80px rgba(0,0,0,.35)}
    h1{margin:0 0 12px;color:white}
    p{line-height:1.6;color:#cbd5e1}
    .mark{width:64px;height:64px;border-radius:18px;background:#22c55e;display:grid;place-items:center;color:white;font-weight:900;font-size:28px;margin-bottom:18px}
  </style>
</head>
<body>
  <div class="card">
    <div class="mark">GP</div>
    <h1>GreenPrinting sedang offline</h1>
    <p>Aplikasi tetap bisa dibuka dari cache untuk halaman yang pernah dikunjungi. Sambungkan kembali jaringan untuk sinkronisasi WAHA, email, dan data server.</p>
  </div>
</body>
</html>
